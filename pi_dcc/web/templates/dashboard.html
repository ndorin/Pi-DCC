<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-DCC Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Dust Collection Control</h1>
            <div id="collector-status" class="status-badge off">Collector: OFF</div>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="status">Status</button>
            <button class="tab-btn" data-tab="network">Network Layout</button>
        </nav>

        <!-- Status Tab -->
        <div id="tab-status" class="tab-content active">

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Current Airflow</div>
                <div class="stat-value" id="current-cfm">-- CFM</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Required Airflow</div>
                <div class="stat-value" id="required-cfm">-- CFM</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Runtime</div>
                <div class="stat-value" id="runtime-hours">-- hrs</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Filter Status</div>
                <div class="stat-value" id="filter-status">--%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="filter-progress"></div>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>Active Tools</h2>
            <ul id="active-tools" class="item-list">
                <li class="empty-state">No tools running</li>
            </ul>
        </section>

        <section class="panel">
            <h2>Manual Triggers</h2>
            <ul id="active-triggers" class="item-list">
                <li class="empty-state">No triggers active</li>
            </ul>
        </section>

        <section class="panel">
            <h2>Blast Gates</h2>
            <ul id="blast-gates" class="item-list">
                <li class="empty-state">Loading...</li>
            </ul>
        </section>

        <section class="panel actions">
            <button id="btn-filter-reset" class="btn btn-warning">Reset Filter Counter</button>
        </section>
        </div>

        <!-- Network Layout Tab -->
        <div id="tab-network" class="tab-content">
            <section class="panel network-panel">
                <div class="network-controls">
                    <div class="network-legend">
                        <span class="legend-item"><span class="legend-dot collector-dot"></span> Collector</span>
                        <span class="legend-item"><span class="legend-dot pipe-dot"></span> Pipe</span>
                        <span class="legend-item"><span class="legend-dot gate-closed-dot"></span> Gate (closed)</span>
                        <span class="legend-item"><span class="legend-dot gate-open-dot"></span> Gate (open)</span>
                        <span class="legend-item"><span class="legend-dot tool-dot"></span> Tool</span>
                        <span class="legend-item"><span class="legend-dot trigger-dot"></span> Manual Trigger</span>
                        <span class="legend-item"><span class="legend-dot override-dot"></span> Web Override</span>
                    </div>
                    <button id="btn-stop-all" class="btn btn-danger">Stop All &amp; Close Gates</button>
                </div>
                <div id="network-diagram"></div>
            </section>
        </div>
    </div>

    <script>
        const POLL_INTERVAL = 1000;

        async function fetchStatus() {
            try {
                const resp = await fetch('/api/status');
                if (!resp.ok) return;
                const data = await resp.json();
                updateDashboard(data);
            } catch (e) {
                console.error('Failed to fetch status:', e);
            }
        }

        function updateDashboard(data) {
            // Collector status
            const badge = document.getElementById('collector-status');
            if (data.collector_running) {
                badge.textContent = 'Collector: ON';
                badge.className = 'status-badge on';
            } else {
                badge.textContent = 'Collector: OFF';
                badge.className = 'status-badge off';
            }

            // Stats
            document.getElementById('current-cfm').textContent = data.current_cfm + ' CFM';
            document.getElementById('required-cfm').textContent = data.required_cfm + ' CFM';
            document.getElementById('runtime-hours').textContent = data.cumulative_runtime_hours + ' hrs';
            document.getElementById('filter-status').textContent = data.filter_status_pct + '%';

            // Filter progress bar
            const progress = document.getElementById('filter-progress');
            progress.style.width = Math.min(data.filter_status_pct, 100) + '%';
            if (data.filter_status_pct >= 90) {
                progress.className = 'progress-fill danger';
            } else if (data.filter_status_pct >= 70) {
                progress.className = 'progress-fill warning';
            } else {
                progress.className = 'progress-fill';
            }

            // Active tools
            const toolsList = document.getElementById('active-tools');
            if (data.active_tools.length === 0) {
                toolsList.innerHTML = '<li class="empty-state">No tools running</li>';
            } else {
                toolsList.innerHTML = data.active_tools
                    .map(t => `<li class="tool-active">${t}</li>`)
                    .join('');
            }

            // Active triggers
            const triggersList = document.getElementById('active-triggers');
            if (data.active_triggers.length === 0) {
                triggersList.innerHTML = '<li class="empty-state">No triggers active</li>';
            } else {
                triggersList.innerHTML = data.active_triggers
                    .map(t => `<li class="trigger-active">${t}</li>`)
                    .join('');
            }

            // Blast gates
            const gatesList = document.getElementById('blast-gates');
            const allGates = [...new Set([...data.open_gates, ...data.supplemental_gates])];
            if (allGates.length === 0 && data.open_gates.length === 0) {
                gatesList.innerHTML = '<li class="empty-state">All gates closed</li>';
            } else {
                // Show open gates with their type
                let html = '';
                for (const g of data.open_gates) {
                    html += `<li class="gate-open">${g}</li>`;
                }
                for (const g of data.supplemental_gates) {
                    html += `<li class="gate-supplemental">${g} (supplemental)</li>`;
                }
                if (html === '') {
                    html = '<li class="empty-state">All gates closed</li>';
                }
                gatesList.innerHTML = html;
            }
        }

        document.getElementById('btn-filter-reset').addEventListener('click', async () => {
            if (!confirm('Reset filter runtime counter?')) return;
            try {
                const resp = await fetch('/api/filter/reset', { method: 'POST' });
                if (resp.ok) fetchStatus();
            } catch (e) {
                console.error('Failed to reset filter:', e);
            }
        });

        // Poll for updates
        fetchStatus();
        setInterval(fetchStatus, POLL_INTERVAL);

        // ===== Tab Navigation =====
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'network' && !networkLoaded) {
                    loadNetwork();
                }
            });
        });

        // ===== Network Diagram =====
        let networkLoaded = false;
        let networkData = null;
        let toolMap = {};

        async function loadNetwork() {
            try {
                const resp = await fetch('/api/network');
                if (!resp.ok) return;
                const data = await resp.json();
                networkData = data.network;
                toolMap = data.tool_map;
                networkLoaded = true;
                renderNetwork();
            } catch (e) {
                console.error('Failed to load network:', e);
            }
        }

        function renderNetwork() {
            if (!networkData) return;

            const container = document.getElementById('network-diagram');
            const layout = computeLayout(networkData);

            const width = layout.width + 40;
            const height = layout.height + 60;

            let html = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;
            html += renderNode(networkData, layout.positions, 20, 20);
            html += '</svg>';
            container.innerHTML = html;

            // Attach click handlers to toggle buttons
            container.querySelectorAll('.gate-toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => toggleGateOverride(btn.dataset.nodeId));
            });
        }

        async function toggleGateOverride(nodeId) {
            try {
                const resp = await fetch('/api/override/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ node_id: nodeId })
                });
                if (resp.ok) fetchStatus();
            } catch (e) {
                console.error('Failed to toggle override:', e);
            }
        }

        document.getElementById('btn-stop-all').addEventListener('click', async () => {
            try {
                const resp = await fetch('/api/override/stop-all', { method: 'POST' });
                if (resp.ok) fetchStatus();
            } catch (e) {
                console.error('Failed to stop all:', e);
            }
        });

        function computeLayout(node) {
            const NODE_W = 170;
            const NODE_H = 90;
            const H_GAP = 20;
            const V_GAP = 90;

            const positions = {};
            const leafWidths = {};

            function getSubtreeWidth(n) {
                if (n.children.length === 0) {
                    leafWidths[n.id] = NODE_W;
                    return NODE_W;
                }
                let total = 0;
                for (const child of n.children) {
                    total += getSubtreeWidth(child);
                }
                total += (n.children.length - 1) * H_GAP;
                leafWidths[n.id] = total;
                return total;
            }

            const totalWidth = getSubtreeWidth(node);

            function assignPositions(n, x, y) {
                const w = leafWidths[n.id];
                positions[n.id] = { x: x + w / 2, y: y, w: NODE_W, h: NODE_H };

                let childX = x;
                for (const child of n.children) {
                    const childW = leafWidths[child.id];
                    assignPositions(child, childX, y + NODE_H + V_GAP);
                    childX += childW + H_GAP;
                }
            }

            assignPositions(node, 0, 0);
            const maxY = Math.max(...Object.values(positions).map(p => p.y));

            return { positions, width: totalWidth, height: maxY + NODE_H };
        }

        function renderNode(node, positions, offsetX, offsetY) {
            const pos = positions[node.id];
            const cx = pos.x + offsetX;
            const cy = pos.y + offsetY;
            let svg = '';

            // Draw connections to children
            for (const child of node.children) {
                const childPos = positions[child.id];
                const childCx = childPos.x + offsetX;
                const childCy = childPos.y + offsetY;

                const pipeWidth = Math.max(2, (child.pipe_diameter_inches || 4) * 1.2);
                const midY = cy + pos.h / 2 + (childCy - cy - pos.h / 2) / 2;

                svg += `<path d="M${cx},${cy + pos.h / 2} L${cx},${midY} L${childCx},${midY} L${childCx},${childCy - pos.h / 2}"
                    fill="none" stroke="#5a7a9a" stroke-width="${pipeWidth}" stroke-linecap="round"/>`;
                svg += `<text x="${(cx + childCx) / 2 + 10}" y="${midY - 5}" class="pipe-label">${child.pipe_diameter_inches}"</text>`;
            }

            // Determine node type and appearance
            const isCollector = node.id === networkData.id && !node.blast_gate;
            const hasGate = !!node.blast_gate;
            const tools = toolMap[node.id] || [];
            const isOverridden = currentStatus && currentStatus.web_overrides &&
                currentStatus.web_overrides.includes(node.id);

            let fillColor = '#2c3e50';
            let strokeColor = '#5a7a9a';
            let label = node.id.replace(/_/g, ' ');
            let sublabel = '';
            let nodeClass = 'node-pipe';

            if (isCollector) {
                fillColor = '#8e44ad';
                strokeColor = '#9b59b6';
                label = 'Dust Collector';
                sublabel = `${networkData.pipe_diameter_inches}" main`;
                nodeClass = 'node-collector';
            } else if (hasGate) {
                const gateId = node.blast_gate.id;
                const isOpen = currentStatus && (
                    currentStatus.open_gates.includes(gateId) ||
                    currentStatus.supplemental_gates.includes(gateId)
                );
                if (isOverridden) {
                    fillColor = '#1a5276';
                    strokeColor = '#5dade2';
                } else if (isOpen) {
                    fillColor = '#1e8449';
                    strokeColor = '#2ecc71';
                } else {
                    fillColor = '#922b21';
                    strokeColor = '#e74c3c';
                }
                label = node.blast_gate.id.replace('gate_', '').replace(/_/g, ' ');
                sublabel = `${node.blast_gate.diameter_inches}" gate`;
                nodeClass = isOpen ? 'node-gate-open' : 'node-gate-closed';
            }

            // Draw node box
            const boxW = pos.w - 20;
            const boxH = pos.h - 10;
            const boxX = cx - boxW / 2;
            const boxY = cy - boxH / 2;
            const radius = 8;

            svg += `<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" rx="${radius}"
                fill="${fillColor}" stroke="${strokeColor}" stroke-width="2" class="${nodeClass}"/>`;

            // Label
            svg += `<text x="${cx}" y="${cy - 14}" text-anchor="middle" class="node-label">${label}</text>`;
            if (sublabel) {
                svg += `<text x="${cx}" y="${cy}" text-anchor="middle" class="node-sublabel">${sublabel}</text>`;
            }

            // Toggle button (for nodes with blast gates)
            if (hasGate) {
                const btnW = 60;
                const btnH = 20;
                const btnX = cx - btnW / 2;
                const btnY = cy + 8;
                const btnFill = isOverridden ? '#5dade2' : '#444';
                const btnText = isOverridden ? 'ON' : 'OFF';
                const btnTextColor = isOverridden ? '#000' : '#aaa';

                svg += `<foreignObject x="${btnX}" y="${btnY}" width="${btnW}" height="${btnH}">
                    <button xmlns="http://www.w3.org/1999/xhtml" class="gate-toggle-btn" data-node-id="${node.id}"
                        style="width:100%;height:100%;border:none;border-radius:4px;background:${btnFill};color:${btnTextColor};font-size:10px;font-weight:700;cursor:pointer;">
                        ${btnText}
                    </button>
                </foreignObject>`;
            }

            // Tool/trigger labels below the node
            if (tools.length > 0) {
                for (let i = 0; i < tools.length; i++) {
                    const t = tools[i];
                    const ty = boxY + boxH + 14 + (i * 16);
                    const tColor = t.type === 'tool' ? '#3498db' : '#9b59b6';
                    const icon = t.type === 'tool' ? '⚡' : '🔘';
                    svg += `<text x="${cx}" y="${ty}" text-anchor="middle" class="tool-label" fill="${tColor}">${icon} ${t.name}</text>`;
                }
            }

            // Recurse to children
            for (const child of node.children) {
                svg += renderNode(child, positions, offsetX, offsetY);
            }

            return svg;
        }

        // Keep current status reference for network coloring
        let currentStatus = null;
        const origUpdateDashboard = updateDashboard;
        updateDashboard = function(data) {
            currentStatus = data;
            origUpdateDashboard(data);
            if (networkLoaded) renderNetwork();
        };
    </script>
</body>
</html>
